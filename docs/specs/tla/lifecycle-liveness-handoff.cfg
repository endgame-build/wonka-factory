\* lifecycle-liveness-handoff.cfg — BoundedHandoffLiveness only
\* Split from lifecycle.cfg: one liveness property per run.

CONSTANTS
    MaxTasks = 8
    Workers = {w1, w2, w3}
    Branches = {b1, b2}
    Orchestrators = {orch1, orch2}
    MaxRetries = 1
    MaxHandoffs = 2
    GapTolerance = 2
    HumanActions = FALSE
    None = None

SPECIFICATION StaticSpecLifecycle

PROPERTY BoundedHandoffLiveness
