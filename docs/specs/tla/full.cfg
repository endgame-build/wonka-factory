\* full.cfg — Complete model with human re-open and crash recovery
\* Expected runtime: overnight
\* Purpose: full state space exploration at realistic parameters
\* Includes: 2 branches, 3 workers, 2 orchestrators, human re-open

CONSTANTS
    MaxTasks = 10
    Workers = {w1, w2, w3}
    Branches = {b1, b2}
    Orchestrators = {orch1, orch2}
    MaxRetries = 2
    MaxHandoffs = 3
    GapTolerance = 3
    HumanActions = TRUE
    None = None

\* SYMMETRY WorkerSymmetry  \* disabled: incompatible with liveness checking

\* 2 plan tasks (one per branch), rest dynamically created
SPECIFICATION StaticSpecLifecycle

\* All state invariants
INVARIANT TypeOK
INVARIANT LifecycleExclusion
INVARIANT SingleAssignment
INVARIANT DependencyOrdering
INVARIANT GateAuthority
INVARIANT BoundedDegradation
INVARIANT WorkspaceWriteSerialization
INVARIANT ValidRoles
INVARIANT AcyclicGraph
INVARIANT SingleGatePerBranch
INVARIANT BoundedHandoff

\* Action constraints
ACTION_CONSTRAINT TerminalIrreversibility
ACTION_CONSTRAINT CounterResetOnReopen

\* Liveness — EventualTermination deliberately OMITTED
\* With HumanActions=TRUE, termination is not guaranteed (by design).
\* The spec documents this: BVV-L-01 assumes a closed system.
\* Running EventualTermination here SHOULD produce a counterexample
\* showing the human re-open loop — this is a VALIDATION of the model.

PROPERTY WorkerRecovery
PROPERTY LockRelease
PROPERTY BoundedHandoffLiveness
