\* smoke.cfg — Minimal model: 3 tasks (linear chain), 1 worker
\* Expected runtime: seconds to minutes
\* Purpose: validate spec compiles and basic paths work

\* Model values
CONSTANTS
    MaxTasks = 3
    Workers = {w1}
    Branches = {b1}
    Orchestrators = {orch1}
    MaxRetries = 1
    MaxHandoffs = 1
    GapTolerance = 1
    HumanActions = FALSE
    None = None

\* Static init: pre-wired linear chain plan(t1) -> build(t2) -> vv(t3)
SPECIFICATION StaticSpec3

\* State invariants
INVARIANT TypeOK
INVARIANT SingleAssignment
INVARIANT DependencyOrdering
INVARIANT GateAuthority
INVARIANT BoundedDegradation
INVARIANT ValidRoles
INVARIANT AcyclicGraph
INVARIANT BoundedHandoff
INVARIANT LifecycleExclusion

\* Action constraints
ACTION_CONSTRAINT TerminalIrreversibility
ACTION_CONSTRAINT CounterResetOnReopen

\* Liveness
PROPERTY EventualTermination
