\* small.cfg — Concurrency model: 5 tasks, 2 workers
\* Expected runtime: tens of minutes
\* Purpose: find concurrency bugs in dispatch + assignment
\* Topology: plan(t1) -> build(t2) -> [vv1(t3) || vv2(t4)] -> gate(t5)

CONSTANTS
    MaxTasks = 5
    Workers = {w1, w2}
    Branches = {b1}
    Orchestrators = {orch1}
    MaxRetries = 2
    MaxHandoffs = 2
    GapTolerance = 2
    HumanActions = FALSE
    None = None

\* SYMMETRY WorkerSymmetry  \* disabled: incompatible with liveness checking

\* Static init with parallel V&V tasks
SPECIFICATION StaticSpec5

\* All state invariants
INVARIANT TypeOK
INVARIANT LifecycleExclusion
INVARIANT SingleAssignment
INVARIANT DependencyOrdering
INVARIANT GateAuthority
INVARIANT BoundedDegradation
INVARIANT WorkspaceWriteSerialization
INVARIANT ValidRoles
INVARIANT AcyclicGraph
INVARIANT SingleGatePerBranch
INVARIANT BoundedHandoff

\* Action constraints
ACTION_CONSTRAINT TerminalIrreversibility
ACTION_CONSTRAINT CounterResetOnReopen

\* Liveness
PROPERTY EventualTermination
PROPERTY WorkerRecovery
PROPERTY LockRelease
PROPERTY BoundedHandoffLiveness
