\* lifecycle-liveness-recovery.cfg — WorkerRecovery + LockRelease
\* Split from lifecycle.cfg: grouped because both are small formulas.

CONSTANTS
    MaxTasks = 8
    Workers = {w1, w2, w3}
    Branches = {b1, b2}
    Orchestrators = {orch1, orch2}
    MaxRetries = 1
    MaxHandoffs = 2
    GapTolerance = 2
    HumanActions = FALSE
    None = None

SPECIFICATION StaticSpecLifecycle

PROPERTY WorkerRecovery
PROPERTY LockRelease
