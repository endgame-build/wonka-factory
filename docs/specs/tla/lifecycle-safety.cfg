\* lifecycle-safety.cfg — Safety invariants only (no liveness)
\* Split from lifecycle.cfg to avoid TLC temporal formula DNF limit.
\* Run this first, then check liveness properties individually.

CONSTANTS
    MaxTasks = 8
    Workers = {w1, w2, w3}
    Branches = {b1, b2}
    Orchestrators = {orch1, orch2}
    MaxRetries = 1
    MaxHandoffs = 2
    GapTolerance = 2
    HumanActions = FALSE
    None = None

\* 2 plan tasks (one per branch), rest dynamically created by planner
SPECIFICATION StaticSpecLifecycle

\* All state invariants
INVARIANT TypeOK
INVARIANT LifecycleExclusion
INVARIANT SingleAssignment
INVARIANT DependencyOrdering
INVARIANT GateAuthority
INVARIANT BoundedDegradation
INVARIANT WorkspaceWriteSerialization
INVARIANT ValidRoles
INVARIANT AcyclicGraph
INVARIANT SingleGatePerBranch
INVARIANT BoundedHandoff

\* Action constraints
ACTION_CONSTRAINT TerminalIrreversibility
ACTION_CONSTRAINT CounterResetOnReopen
