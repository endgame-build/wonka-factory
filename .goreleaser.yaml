version: 2

builds:
  - main: ./cmd/wonka
    binary: wonka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/endgame/wonka-factory/internal/cmd.version={{.Version}}
      - -X github.com/endgame/wonka-factory/internal/cmd.commit={{.Commit}}
      - -X github.com/endgame/wonka-factory/internal/cmd.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  algorithm: sha256

changelog:
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  draft: false
  prerelease: auto
