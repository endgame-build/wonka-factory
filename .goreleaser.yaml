version: 2

builds:
  - main: ./cmd/wonka
    binary: wonka
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # NOTE: -X injection of version/commit/date into internal/cmd will be
      # re-enabled in Phase 7 when cmd/wonka is wired to cobra + internal/cmd.
      # The internal/cmd package does not yet exist, so referencing symbols
      # there would fail the linker.

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  algorithm: sha256

changelog:
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"

release:
  draft: false
  prerelease: auto
